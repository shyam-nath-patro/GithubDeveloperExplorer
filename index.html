<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Developer Explorer</title>
<link rel="shortcut icon" href="./GitHub.ico" type="image/x-icon">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-4">

    <h1 class="text-center fw-bold mb-4">
        GitHub Developer Explorer
    </h1>

    <!-- HERO SECTION -->

    <section id="heroSection" class="hero-section mb-5">

        <div class="row align-items-center">

            <div class="col-lg-6">

                <h2 class="hero-title">
                    Discover Developers on GitHub
                </h2>

                <p class="hero-text">
                    Search GitHub users and explore their profiles,
                    repositories, programming languages, stars,
                    followers and development activity using GitHub's
                    public REST APIs.
                </p>

                <div class="feature-list">
                    <span>👤 Profiles</span>
                    <span>📁 Repositories</span>
                    <span>📊 Language Stats</span>
                    <span>⭐ Stars</span>
                </div>

            </div>

            <div class="col-lg-6 text-center mt-4 mt-lg-0">
                <img
                    src="./Homeimg.png"
                    alt="Project Preview"
                    class="hero-img img-fluid">

            </div>

        </div>

    </section>

    
<script src="script.js"></script>

</body>
</html>
